<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welo Sefer St. Maryam</title>
    <script>
      (function() {
        if (!window.location.hash && !window.location.search) {
          window.location.hash = '#/';
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{background:#faf6ef;color:#1a2a4a;font-family:sans-serif}
      #loading{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#faf6ef;transition:opacity .5s}
      #loading img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.2}
      #loading .content{position:relative;text-align:center}
      #loading .spinner{width:40px;height:40px;border:4px solid rgba(196,160,90,.3);border-top-color:#c4a05a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.5rem}
      @keyframes spin{to{transform:rotate(360deg)}}
      #loading h1{font-family:Georgia,serif;color:#1a2a4a;font-size:1.5rem}
      #loading p{color:#1a2a4a99;font-size:.875rem;margin-top:.25rem}
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">
        <img src="curent church.PNG" alt="" />
        <div class="content">
          <div class="spinner"></div>
          <h1>ወሎ ሰፈር ቤተክርስቲያን</h1>
          <p>Welo Sefer St. Maryam</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function(){
        var el = document.getElementById('loading');
        setTimeout(function(){
          if(el) { el.style.opacity = '0'; setTimeout(function(){ el.remove(); }, 400); }
        }, 2500);
      })();
    </script>
  </body>
</html>
